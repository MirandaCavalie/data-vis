<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Streamgraph – Energy Consumption</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    .back-link {
      align-self: flex-start;
      max-width: 940px;
      width: 100%;
      margin: 0 auto 15px auto;
    }
    .chart-link {
      display: inline-block;
      background: steelblue;
      color: white;
      padding: 8px 18px;
      border-radius: 5px;
      font-size: 14px;
      text-decoration: none;
    }
    .chart-link:hover { background: #2a6496; }
    .chart-container {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 30px;
      max-width: 940px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    h1 { color: #2c3e50; font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #777; margin-bottom: 20px; }
    .axis text { fill: #555; font-family: Arial, sans-serif; font-size: 12px; }
    .axis path, .axis line { stroke: #ccc; }
    .axis-label { fill: #555; font-size: 13px; font-family: Arial, sans-serif; }
    .stream-layer { opacity: 0.82; cursor: pointer; transition: opacity 0.2s; }
    .stream-layer:hover { opacity: 1; }
    .crosshair { stroke: rgba(0,0,0,0.3); stroke-width: 1px; stroke-dasharray: 4,3; pointer-events: none; }
    .tooltip {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 13px;
      color: #333;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      font-family: Arial, sans-serif;
      min-width: 160px;
    }
    .legendTitle { font-size: 12px; font-weight: bold; fill: #333; font-family: Arial, sans-serif; }
    .label { font-size: 11px; fill: #555; font-family: Arial, sans-serif; }
  </style>
</head>
<body>
  <div class="back-link"><a class="chart-link" href="index.html">← Back to Home</a></div>
  <div class="chart-container">
    <h1>Hourly Energy Consumption — Streamgraph</h1>
    <p class="subtitle">d3.stackOffsetWiggle · 4 PJM regions · daily averages · hover for details</p>
    <div id="chart"></div>
  </div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const margin = { top: 50, right: 160, bottom: 55, left: 55 };
    const innerWidth  = 620;
    const innerHeight = 380;
    const svgW = innerWidth + margin.left + margin.right;
    const svgH = innerHeight + margin.top + margin.bottom;

    const svg = d3.select("#chart")
      .append("svg")
      .attr("viewBox", `0 0 ${svgW} ${svgH}`)
      .attr("preserveAspectRatio", "xMidYMid meet")
      .style("width", "100%")
      .style("height", "auto")
      .append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    const tooltip   = d3.select("#tooltip");
    const parseDate = d3.timeParse("%Y-%m-%d");
    const fmtHover  = d3.timeFormat("%b %d, %Y");
    const fmtMW     = d3.format(",");

    const keys   = ["PJMW_MW", "FE_MW", "DEOK_MW", "COMED_MW"];
    const labels = { PJMW_MW: "PJMW", FE_MW: "FE", DEOK_MW: "DEOK", COMED_MW: "COMED" };

    const colorScale = d3.scaleOrdinal()
      .domain(keys)
      .range(["#e05252", "#5b9bd5", "#59b85e", "#f0a842"]);

    d3.csv("energy_consumption.csv").then(raw => {
      const data = raw.map(d => ({
        date:     parseDate(d.Datetime),
        PJMW_MW:  +d.PJMW_MW,
        FE_MW:    +d.FE_MW,
        DEOK_MW:  +d.DEOK_MW,
        COMED_MW: +d.COMED_MW
      })).sort((a, b) => a.date - b.date);

      const stack = d3.stack()
        .keys(keys)
        .offset(d3.stackOffsetWiggle)
        .order(d3.stackOrderInsideOut);   

      const stacked = stack(data);

      const x = d3.scaleTime()
        .domain(d3.extent(data, d => d.date))
        .range([0, innerWidth]);

      const allY = stacked.flatMap(layer => layer.flatMap(d => [d[0], d[1]]));
      const y = d3.scaleLinear()
        .domain([d3.min(allY), d3.max(allY)])
        .nice()
        .range([innerHeight, 0]);

      const areaGen = d3.area()
        .x(d => x(d.data.date))
        .y0(d => y(d[0]))
        .y1(d => y(d[1]))
        .curve(d3.curveBasis);          

      const layers = svg.selectAll(".stream-layer")
        .data(stacked)
        .join("path")
        .attr("class", "stream-layer")
        .attr("d", areaGen)
        .attr("fill", d => colorScale(d.key));

      svg.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(
          d3.axisBottom(x)
            .ticks(d3.timeMonth.every(2))
            .tickFormat(d3.timeFormat("%b '%y"))
        )
        .selectAll("text").attr("dy", "1.1em");

      svg.append("text")
        .attr("class", "axis-label")
        .attr("x", innerWidth / 2)
        .attr("y", innerHeight + 48)
        .attr("text-anchor", "middle")
        .text("Month");

      svg.append("text")
        .attr("x", innerWidth / 2)
        .attr("y", -20)
        .attr("text-anchor", "middle")
        .attr("font-size", "15px")
        .attr("font-weight", "bold")
        .attr("fill", "#2c3e50")
        .attr("font-family", "Arial, sans-serif")
        .text("Hourly Energy Consumption Streamgraph — 4 PJM Regions");

      const bisectDate = d3.bisector(d => d.date).left;

      const crosshair = svg.append("line")
        .attr("class", "crosshair")
        .attr("y1", 0).attr("y2", innerHeight)
        .attr("opacity", 0);

      layers.on("mousemove", function(event, layerData) {
        const [mx] = d3.pointer(event);
        const x0   = x.invert(mx);
        const i    = bisectDate(data, x0, 1);
        const d0   = data[i - 1] || data[0];
        const d1   = data[i]     || data[data.length - 1];
        const d    = x0 - d0.date > d1.date - x0 ? d1 : d0;

        crosshair.attr("x1", x(d.date)).attr("x2", x(d.date)).attr("opacity", 1);

        const cityKey   = layerData.key;
        const cityLabel = labels[cityKey];
        const value     = d[cityKey];
        const color     = colorScale(cityKey);

        layers.attr("opacity", l => l.key === cityKey ? 1 : 0.4);

        let html = `<strong>${fmtHover(d.date)}</strong><hr style="margin:4px 0;border-color:#eee">`;
        keys.forEach(k => {
          const isActive = k === cityKey;
          html += `<span style="color:${colorScale(k)};font-weight:${isActive ? 'bold' : 'normal'}">●</span> ` +
                  `${labels[k]}: <strong>${fmtMW(d[k])} MW</strong><br>`;
        });

        tooltip.style("opacity", 1).html(html)
          .style("left", (event.pageX + 16) + "px")
          .style("top",  (event.pageY - 60) + "px");
      })
      .on("mouseleave", function() {
        layers.attr("opacity", 0.82);
        crosshair.attr("opacity", 0);
        tooltip.style("opacity", 0);
      });

      const legendScale = d3.scaleOrdinal()
        .domain(keys.map(k => labels[k]))
        .range(keys.map(k => colorScale(k)));

      const legend = d3.legendColor()
        .title("Region")
        .scale(legendScale)
        .shapeWidth(22)
        .shapeHeight(14)
        .shapePadding(6)
        .labelAlign("start");

      svg.append("g")
        .attr("class", "legendColor")
        .attr("transform", `translate(${innerWidth + 20}, 20)`)
        .call(legend);

    }).catch(err => {
      d3.select("#chart").append("p")
        .style("color", "red")
        .text("Error loading energy_consumption.csv: " + err.message);
    });
  </script>
</body>
</html>

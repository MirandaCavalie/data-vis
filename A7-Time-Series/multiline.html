<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi-Line Chart – Energy Consumption</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    .back-link {
      align-self: flex-start;
      max-width: 940px;
      width: 100%;
      margin: 0 auto 15px auto;
    }
    .chart-link {
      display: inline-block;
      background: steelblue;
      color: white;
      padding: 8px 18px;
      border-radius: 5px;
      font-size: 14px;
      text-decoration: none;
    }
    .chart-link:hover { background: #2a6496; }
    .chart-container {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 30px;
      max-width: 940px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    h1 { color: #2c3e50; font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #777; margin-bottom: 20px; }
    .axis text { fill: #555; font-family: Arial, sans-serif; font-size: 12px; }
    .axis path, .axis line { stroke: #ccc; }
    .axis-label { fill: #555; font-size: 13px; font-family: Arial, sans-serif; }
    .line-path { fill: none; stroke-width: 2.5px; }
    /* vertical hover crosshair */
    .crosshair { stroke: #999; stroke-width: 1px; stroke-dasharray: 4,3; pointer-events: none; }
    .hover-dot { pointer-events: none; }
    .tooltip {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 13px;
      color: #333;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      font-family: Arial, sans-serif;
      min-width: 160px;
    }
    .legendTitle { font-size: 12px; font-weight: bold; fill: #333; font-family: Arial, sans-serif; }
    .label { font-size: 11px; fill: #555; font-family: Arial, sans-serif; }
  </style>
</head>
<body>
  <div class="back-link"><a class="chart-link" href="index.html">← Back to Home</a></div>
  <div class="chart-container">
    <h1>Hourly Energy Consumption by Region</h1>
    <p class="subtitle">Multi-Line Chart · 4 PJM regions · daily averages · hover for details</p>
    <div id="chart"></div>
  </div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const margin = { top: 50, right: 160, bottom: 65, left: 65 };
    const innerWidth  = 620;
    const innerHeight = 380;
    const svgW = innerWidth + margin.left + margin.right;
    const svgH = innerHeight + margin.top + margin.bottom;

    const svg = d3.select("#chart")
      .append("svg")
      .attr("viewBox", `0 0 ${svgW} ${svgH}`)
      .attr("preserveAspectRatio", "xMidYMid meet")
      .style("width", "100%")
      .style("height", "auto")
      .append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    const tooltip   = d3.select("#tooltip");
    const parseDate = d3.timeParse("%Y-%m-%d");
    const fmtHover  = d3.timeFormat("%b %d, %Y");
    const fmtMW     = d3.format(",");

    const series = [
      { key: "PJMW_MW",  label: "PJMW"  },
      { key: "FE_MW",    label: "FE"    },
      { key: "DEOK_MW",  label: "DEOK"  },
      { key: "COMED_MW", label: "COMED" }
    ];

    const colorScale = d3.scaleOrdinal()
      .domain(series.map(s => s.label))
      .range(d3.schemeSet1);

    d3.csv("energy_consumption.csv").then(raw => {
      const data = raw.map(d => ({
        date:     parseDate(d.Datetime),
        PJMW_MW:  +d.PJMW_MW,
        FE_MW:    +d.FE_MW,
        DEOK_MW:  +d.DEOK_MW,
        COMED_MW: +d.COMED_MW
      })).sort((a, b) => a.date - b.date);

      const x = d3.scaleTime()
        .domain(d3.extent(data, d => d.date))
        .range([0, innerWidth]);

      const allVals = data.flatMap(d => series.map(s => d[s.key]));
      const y = d3.scaleLinear()
        .domain([d3.min(allVals) * 0.95, d3.max(allVals) * 1.05])
        .nice()
        .range([innerHeight, 0]);

      svg.append("g")
        .call(d3.axisLeft(y).ticks(6).tickSize(-innerWidth).tickFormat(""))
        .call(g => g.select(".domain").remove())
        .call(g => g.selectAll("line").attr("stroke", "#ebebeb"));

      svg.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(
          d3.axisBottom(x)
            .ticks(d3.timeMonth.every(2))
            .tickFormat(d3.timeFormat("%b '%y"))
        )
        .selectAll("text")
          .attr("dy", "1.1em");

      svg.append("g")
        .attr("class", "axis")
        .call(d3.axisLeft(y).ticks(6).tickFormat(d => (d / 1000).toFixed(0) + "k"))
        .call(g => g.select(".domain").remove());

      svg.append("text")
        .attr("class", "axis-label")
        .attr("x", innerWidth / 2)
        .attr("y", innerHeight + 52)
        .attr("text-anchor", "middle")
        .text("Date");

      svg.append("text")
        .attr("class", "axis-label")
        .attr("transform", "rotate(-90)")
        .attr("x", -innerHeight / 2)
        .attr("y", -52)
        .attr("text-anchor", "middle")
        .text("Energy Load (MW)");

      svg.append("text")
        .attr("x", innerWidth / 2)
        .attr("y", -20)
        .attr("text-anchor", "middle")
        .attr("font-size", "15px")
        .attr("font-weight", "bold")
        .attr("fill", "#2c3e50")
        .attr("font-family", "Arial, sans-serif")
        .text("Hourly Energy Consumption — 4 PJM Regions");

      series.forEach(s => {
        const lineGen = d3.line()
          .x(d => x(d.date))
          .y(d => y(d[s.key]))
          .curve(d3.curveMonotoneX);

        svg.append("path")
          .datum(data)
          .attr("class", "line-path")
          .attr("d", lineGen)
          .attr("stroke", colorScale(s.label))
          .attr("opacity", 0.9);
      });

      const bisectDate = d3.bisector(d => d.date).left;

      const crosshair = svg.append("line")
        .attr("class", "crosshair")
        .attr("y1", 0)
        .attr("y2", innerHeight)
        .attr("opacity", 0);

      const hoverDots = series.map(s =>
        svg.append("circle")
          .attr("class", "hover-dot")
          .attr("r", 5)
          .attr("fill", colorScale(s.label))
          .attr("stroke", "#fff")
          .attr("stroke-width", 2)
          .attr("opacity", 0)
      );

      svg.append("rect")
        .attr("width", innerWidth)
        .attr("height", innerHeight)
        .attr("fill", "none")
        .attr("pointer-events", "all")
        .on("mousemove", function(event) {
          const [mx] = d3.pointer(event);
          const x0   = x.invert(mx);
          const i    = bisectDate(data, x0, 1);
          const d0 = data[i - 1] || data[0];
          const d1 = data[i]     || data[data.length - 1];
          const d  = x0 - d0.date > d1.date - x0 ? d1 : d0;

          crosshair.attr("x1", x(d.date)).attr("x2", x(d.date)).attr("opacity", 1);

          series.forEach((s, idx) => {
            hoverDots[idx]
              .attr("cx", x(d.date))
              .attr("cy", y(d[s.key]))
              .attr("opacity", 1);
          });

          let html = `<strong>${fmtHover(d.date)}</strong><hr style="margin:4px 0;border-color:#eee">`;
          series.forEach(s => {
            html += `<span style="color:${colorScale(s.label)}">●</span> ${s.label}: <strong>${fmtMW(d[s.key])} MW</strong><br>`;
          });

          tooltip.style("opacity", 1).html(html)
            .style("left", (event.pageX + 16) + "px")
            .style("top",  (event.pageY - 60) + "px");
        })
        .on("mouseleave", () => {
          crosshair.attr("opacity", 0);
          hoverDots.forEach(dot => dot.attr("opacity", 0));
          tooltip.style("opacity", 0);
        });

      const legend = d3.legendColor()
        .title("Region")
        .scale(colorScale)
        .shapeWidth(22)
        .shapeHeight(14)
        .shapePadding(6)
        .labelAlign("start");

      svg.append("g")
        .attr("class", "legendColor")
        .attr("transform", `translate(${innerWidth + 20}, 20)`)
        .call(legend);

    }).catch(err => {
      d3.select("#chart").append("p")
        .style("color", "red")
        .text("Error loading energy_consumption.csv: " + err.message);
    });
  </script>
</body>
</html>

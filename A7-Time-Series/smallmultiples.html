<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Small Multiples – Energy Consumption</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    .back-link {
      align-self: flex-start;
      max-width: 960px;
      width: 100%;
      margin: 0 auto 15px auto;
    }
    .chart-link {
      display: inline-block;
      background: steelblue;
      color: white;
      padding: 8px 18px;
      border-radius: 5px;
      font-size: 14px;
      text-decoration: none;
    }
    .chart-link:hover { background: #2a6496; }
    .chart-container {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 30px;
      max-width: 960px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    h1 { color: #2c3e50; font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #777; margin-bottom: 20px; }
    #grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .facet {
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 5px;
      padding: 10px;
    }
    .axis text { fill: #555; font-family: Arial, sans-serif; font-size: 11px; }
    .axis path, .axis line { stroke: #ccc; }
    .axis-label { fill: #555; font-size: 11px; font-family: Arial, sans-serif; }
    .line-path { fill: none; stroke-width: 2.2px; }
    .facet-title { font-size: 13px; font-weight: bold; fill: #2c3e50; font-family: Arial, sans-serif; }
    .crosshair { stroke: #aaa; stroke-width: 1px; stroke-dasharray: 3,3; pointer-events: none; }
    .hover-dot { pointer-events: none; }
    .tooltip {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 12px;
      color: #333;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      font-family: Arial, sans-serif;
      min-width: 130px;
    }
    #legend-wrap {
      margin-top: 18px;
      display: flex;
      justify-content: center;
    }
    .legendTitle { font-size: 12px; font-weight: bold; fill: #333; font-family: Arial, sans-serif; }
    .label { font-size: 11px; fill: #555; font-family: Arial, sans-serif; }
  </style>
</head>
<body>
  <div class="back-link"><a class="chart-link" href="index.html">← Back to Home</a></div>
  <div class="chart-container">
    <h1>Hourly Energy Consumption — Small Multiples</h1>
    <p class="subtitle">One line chart per PJM region · daily averages · shared Y scale · hover for details</p>
    <div id="grid"></div>
    <div id="legend-wrap"><svg id="legend-svg"></svg></div>
  </div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const parseDate = d3.timeParse("%Y-%m-%d");
    const fmtHover  = d3.timeFormat("%b %d, %Y");
    const fmtMW     = d3.format(",");
    const tooltip   = d3.select("#tooltip");

    const series = [
      { key: "PJMW_MW",  label: "PJMW"  },
      { key: "FE_MW",    label: "FE"    },
      { key: "DEOK_MW",  label: "DEOK"  },
      { key: "COMED_MW", label: "COMED" }
    ];

    const margin = { top: 35, right: 20, bottom: 45, left: 50 };
    const iW = 320;  
    const iH = 200;   
    const svgW = iW + margin.left + margin.right;
    const svgH = iH + margin.top  + margin.bottom;

    const colorScale = d3.scaleOrdinal()
      .domain(series.map(s => s.label))
      .range(d3.schemeSet1);

    d3.csv("energy_consumption.csv").then(raw => {
      const data = raw.map(d => ({
        date:     parseDate(d.Datetime),
        PJMW_MW:  +d.PJMW_MW,
        FE_MW:    +d.FE_MW,
        DEOK_MW:  +d.DEOK_MW,
        COMED_MW: +d.COMED_MW
      })).sort((a, b) => a.date - b.date);

      const allVals = data.flatMap(d => series.map(s => d[s.key]));
      const xDomain = d3.extent(data, d => d.date);
      const yDomain = [d3.min(allVals) * 0.95, d3.max(allVals) * 1.05];

      const bisectDate = d3.bisector(d => d.date).left;

      series.forEach(s => {
        const color = colorScale(s.label);

        const facetDiv = d3.select("#grid")
          .append("div")
          .attr("class", "facet");

        const svg = facetDiv.append("svg")
          .attr("viewBox", `0 0 ${svgW} ${svgH}`)
          .attr("preserveAspectRatio", "xMidYMid meet")
          .style("width", "100%")
          .style("height", "auto")
          .append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

        const x = d3.scaleTime().domain(xDomain).range([0, iW]);
        const y = d3.scaleLinear().domain(yDomain).nice().range([iH, 0]);

        svg.append("g")
          .call(d3.axisLeft(y).ticks(5).tickSize(-iW).tickFormat(""))
          .call(g => g.select(".domain").remove())
          .call(g => g.selectAll("line").attr("stroke", "#ebebeb"));

        svg.append("g")
          .attr("class", "axis")
          .attr("transform", `translate(0,${iH})`)
          .call(
            d3.axisBottom(x)
              .ticks(d3.timeMonth.every(2))
              .tickFormat(d3.timeFormat("%b '%y"))
          )
          .selectAll("text")
            .attr("dy", "1.1em")
            .attr("font-size", "10px");

        svg.append("g")
          .attr("class", "axis")
          .call(d3.axisLeft(y).ticks(5).tickFormat(d => (d / 1000).toFixed(0) + "k"))
          .call(g => g.select(".domain").remove());

        svg.append("text")
          .attr("class", "axis-label")
          .attr("transform", "rotate(-90)")
          .attr("x", -iH / 2)
          .attr("y", -40)
          .attr("text-anchor", "middle")
          .text("MW");

        svg.append("text")
          .attr("class", "facet-title")
          .attr("x", iW / 2)
          .attr("y", -14)
          .attr("text-anchor", "middle")
          .attr("fill", color)
          .text(s.label);

        const areaGen = d3.area()
          .x(d => x(d.date))
          .y0(iH)
          .y1(d => y(d[s.key]))
          .curve(d3.curveMonotoneX);

        svg.append("path")
          .datum(data)
          .attr("fill", color)
          .attr("opacity", 0.12)
          .attr("d", areaGen);

        const lineGen = d3.line()
          .x(d => x(d.date))
          .y(d => y(d[s.key]))
          .curve(d3.curveMonotoneX);

        svg.append("path")
          .datum(data)
          .attr("class", "line-path")
          .attr("d", lineGen)
          .attr("stroke", color)
          .attr("opacity", 0.9);

        const crosshair = svg.append("line")
          .attr("class", "crosshair")
          .attr("y1", 0).attr("y2", iH)
          .attr("opacity", 0);

        const hoverDot = svg.append("circle")
          .attr("class", "hover-dot")
          .attr("r", 5)
          .attr("fill", color)
          .attr("stroke", "#fff")
          .attr("stroke-width", 2)
          .attr("opacity", 0);

        svg.append("rect")
          .attr("width", iW)
          .attr("height", iH)
          .attr("fill", "none")
          .attr("pointer-events", "all")
          .on("mousemove", function(event) {
            const [mx] = d3.pointer(event);
            const x0   = x.invert(mx);
            const i    = bisectDate(data, x0, 1);
            const d0   = data[i - 1] || data[0];
            const d1   = data[i]     || data[data.length - 1];
            const d    = x0 - d0.date > d1.date - x0 ? d1 : d0;

            crosshair.attr("x1", x(d.date)).attr("x2", x(d.date)).attr("opacity", 1);
            hoverDot.attr("cx", x(d.date)).attr("cy", y(d[s.key])).attr("opacity", 1);

            tooltip.style("opacity", 1)
              .html(
                `<strong>${fmtHover(d.date)}</strong><br>` +
                `<span style="color:${color}">●</span> ${s.label}: <strong>${fmtMW(d[s.key])} MW</strong>`
              )
              .style("left", (event.pageX + 14) + "px")
              .style("top",  (event.pageY - 50) + "px");
          })
          .on("mouseleave", () => {
            crosshair.attr("opacity", 0);
            hoverDot.attr("opacity", 0);
            tooltip.style("opacity", 0);
          });
      });

      const legendSvg = d3.select("#legend-svg")
        .attr("width", 340)
        .attr("height", 35);

      const swatchW = 16, gap = 80;
      series.forEach((s, i) => {
        const gx = i * gap + 10;
        legendSvg.append("rect")
          .attr("x", gx).attr("y", 10)
          .attr("width", swatchW).attr("height", 12)
          .attr("fill", colorScale(s.label)).attr("rx", 2);
        legendSvg.append("text")
          .attr("x", gx + swatchW + 5).attr("y", 21)
          .attr("font-size", "12px")
          .attr("fill", "#444")
          .attr("font-family", "Arial, sans-serif")
          .text(s.label);
      });

    }).catch(err => {
      d3.select("#grid").append("p")
        .style("color", "red")
        .text("Error loading energy_consumption.csv: " + err.message);
    });
  </script>
</body>
</html>

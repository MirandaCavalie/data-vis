<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SF Evictions — Neighborhood Stories</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #2c2c2c;
    }

    header {
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      padding: 16px 24px;
    }
    header h1 { font-size: 1.3rem; color: #222; }
    header p { font-size: 0.82rem; color: #666; margin-top: 3px; }

    /* ── Era description bar ── */
    #era-bar {
      border-bottom: 1px solid #ddd;
      padding: 10px 24px;
      display: flex;
      gap: 6px;
      font-size: 0.8rem;
      color: #555;
      flex-wrap: wrap;
    }
    #era-bar .era-label {
      padding: 2px 8px;
      background: #eee;
      color: #444;
      font-weight: 600;
    }

    /* ── Small maps row ── */
    #maps-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 20px 24px;
      justify-content: center;
    }

    .era-card {
      background: white;
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
      width: 200px;
      flex-shrink: 0;
    }

    .era-card h3 {
      font-size: 0.82rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 2px;
    }
    .era-card .era-years {
      font-size: 0.72rem;
      color: #888;
      margin-bottom: 8px;
    }
    .era-card svg {
      display: block;
      margin: 0 auto;
    }

    /* ── Color legend for maps ── */
    #map-legend {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      font-size: 0.78rem;
      color: #666;
      padding: 0 24px 12px;
    }
    #legend-gradient-box {
      width: 200px;
      height: 10px;
    }

    /* ── Detail panel ── */
    #detail-panel {
      display: none;
      background: white;
      border: 1px solid #ddd;
      border-top: 3px solid #aaa;
      margin: 0 24px 32px;
      padding: 24px;
    }
    #detail-panel.visible { display: block; }

    #detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    #detail-nhood-name {
      font-size: 1.5rem;
      color: #222;
    }
    #detail-stats {
      font-size: 0.85rem;
      color: #666;
      margin-top: 4px;
    }
    .stat-chip {
      display: inline-block;
      background: #eee;
      color: #444;
      padding: 2px 8px;
      margin-right: 6px;
      font-weight: 600;
    }

    #detail-nav {
      display: flex;
      gap: 8px;
    }
    #detail-nav button {
      background: white;
      color: #333;
      border: 1px solid #bbb;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    #detail-charts {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .detail-chart { flex: 1; min-width: 280px; }
    .detail-chart h4 {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Tooltip ── */
    .tooltip {
      position: fixed;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 200;
    }

    /* ── Legend for bar chart reasons ── */
    .reason-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      font-size: 11px;
    }
    .reason-legend-item {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .reason-dot {
      width: 9px; height: 9px;
      border-radius: 2px;
      flex-shrink: 0;
    }

  </style>
</head>
<body>

<header>
  <h1>SF Evictions by Neighborhood</h1>
  <p>Six eras compared side by side — click any neighborhood to see its full history</p>
</header>

<div id="era-bar">
  Eras:
  <span class="era-label">Pre-2000</span>
  <span class="era-label">Dot-com Bust</span>
  <span class="era-label">Recovery</span>
  <span class="era-label">Tech Boom</span>
  <span class="era-label">Pre-COVID</span>
  <span class="era-label">COVID &amp; After</span>
</div>

<div class="tooltip" id="tooltip"></div>

<!-- Six small maps -->
<div id="maps-row"></div>

<!-- Shared color legend -->
<div id="map-legend">
  <span>Fewer evictions</span>
  <canvas id="legend-gradient-box" width="200" height="10"></canvas>
  <span>More evictions</span>
</div>

<!-- Detail panel (hidden until click) -->
<div id="detail-panel">
  <div id="detail-header">
    <div>
      <div id="detail-nhood-name">—</div>
      <div id="detail-stats"></div>
    </div>
    <div id="detail-nav">
      <button onclick="cycleNeighborhood(-1)">← Prev</button>
      <button onclick="cycleNeighborhood(1)">Next →</button>
      <button onclick="closeDetail()" style="background:#999;">Close</button>
    </div>
  </div>
  <div id="detail-charts">
    <div class="detail-chart">
      <h4>Evictions per Year (1997–2026)</h4>
      <svg id="detail-line-svg"></svg>
    </div>
    <div class="detail-chart">
      <h4>Eviction Reasons (all-time)</h4>
      <svg id="detail-bar-svg"></svg>
      <div class="reason-legend" id="reason-legend"></div>
    </div>
  </div>
</div>

<script>
// ── Name mapping ──────────────────────────────────────────────────────────────
const NAME_MAP = {
  "Bayview Hunters Point": "Bayview",
  "Financial District/South Beach": "Financial District",
  "Oceanview/Merced/Ingleside": "Ocean View",
  "Sunset/Parkside": "Outer Sunset",
  "Treasure Island": "Treasure Island/YBI",
  "Tenderloin": "Downtown/Civic Center",
};

// ── Era definitions ───────────────────────────────────────────────────────────
const ERAS = [
  { label: "Pre-2000",       years: "1997–1999", range: [1997, 1999] },
  { label: "Dot-com Bust",   years: "2000–2004", range: [2000, 2004] },
  { label: "Recovery",       years: "2005–2012", range: [2005, 2012] },
  { label: "Tech Boom",      years: "2013–2016", range: [2013, 2016] },
  { label: "Pre-COVID",      years: "2017–2019", range: [2017, 2019] },
  { label: "COVID & After",  years: "2020–2026", range: [2020, 2026] },
];

const REASONS = [
  "Owner Move In", "Breach", "Nuisance", "Ellis Act WithDrawal",
  "Non Payment", "Capital Improvement", "Late Payments", "Other"
];
const COLOR_REASONS = d3.scaleOrdinal().domain(REASONS).range(d3.schemeTableau10);

// Shared purple color scale across all 6 maps (same domain = comparable)
let globalColorScale;

// Sorted list of all csv neighborhood names (for prev/next)
let allNeighborhoods = [];
let selectedNeighborhood = null; // csv name

const tooltip = d3.select("#tooltip");

// Data globals
let geoData, nhoodYear, nhoodReason, nhoodSummary;

// ── Load data ─────────────────────────────────────────────────────────────────
Promise.all([
  d3.json("data/sf_neighborhoods.geo.json"),
  d3.json("data/evictions_by_neighborhood_year.json"),
  d3.json("data/evictions_by_neighborhood_reason.json"),
  d3.json("data/neighborhood_summary.json"),
]).then(([geo, _nhoodYear, _nhoodReason, _nhoodSummary]) => {
  geoData = geo;
  nhoodYear = _nhoodYear;
  nhoodReason = _nhoodReason;
  nhoodSummary = _nhoodSummary;

  // Sorted neighborhoods for prev/next
  allNeighborhoods = nhoodSummary.map(d => d.neighborhood).sort();

  // Compute global max count per era (across all eras & neighborhoods)
  // so the color scale is consistent
  const eraCountsAll = [];
  ERAS.forEach(era => {
    const eraMap = getEraMap(era.range);
    Object.values(eraMap).forEach(c => eraCountsAll.push(c));
  });
  const globalMax = d3.max(eraCountsAll) || 1;

  globalColorScale = d3.scaleSequential(d3.interpolatePurples)
    .domain([0, globalMax * 0.75]);

  buildLegend(globalMax);
  buildMaps();
  buildReasonLegend();
});

// Return map { csvName: count } for a year range
function getEraMap(range) {
  const m = {};
  nhoodYear.forEach(d => {
    if (d.year >= range[0] && d.year <= range[1]) {
      m[d.neighborhood] = (m[d.neighborhood] || 0) + d.count;
    }
  });
  return m;
}

// ── Build 6 small maps ────────────────────────────────────────────────────────
const SMALL_W = 176, SMALL_H = 176;

function buildMaps() {
  const container = d3.select("#maps-row");

  ERAS.forEach((era, eraIdx) => {
    const eraMap = getEraMap(era.range);

    const card = container.append("div").attr("class", "era-card");
    card.append("h3").text(era.label);
    card.append("div").attr("class", "era-years").text(era.years);

    const svgEl = card.append("svg")
      .attr("id", `era-svg-${eraIdx}`)
      .attr("width", SMALL_W)
      .attr("height", SMALL_H);

    const projection = d3.geoMercator().fitSize([SMALL_W, SMALL_H], geoData);
    const pathGen = d3.geoPath().projection(projection);

    svgEl.selectAll(".nhood")
      .data(geoData.features)
      .join("path")
        .attr("class", "nhood")
        .attr("d", pathGen)
        .attr("stroke", "#fff")
        .attr("stroke-width", 0.5)
        .style("cursor", "pointer")
        .attr("fill", d => {
          const geoName = d.properties.name;
          const csvName = Object.entries(NAME_MAP).find(([k,v]) => v === geoName)?.[0] || geoName;
          const count = eraMap[csvName] || 0;
          return count === 0 ? "#ede8f8" : globalColorScale(count);
        })
      .on("mousemove", (event, d) => {
        const geoName = d.properties.name;
        const csvName = Object.entries(NAME_MAP).find(([k,v]) => v === geoName)?.[0] || geoName;
        const count = eraMap[csvName] || 0;
        tooltip.style("opacity", 1)
          .style("left", (event.clientX + 14) + "px")
          .style("top", (event.clientY - 32) + "px")
          .html(`<strong>${csvName}</strong><br>${era.label}: ${count.toLocaleString()}`);
      })
      .on("mouseleave", () => tooltip.style("opacity", 0))
      .on("click", (event, d) => {
        const geoName = d.properties.name;
        const csvName = Object.entries(NAME_MAP).find(([k,v]) => v === geoName)?.[0] || geoName;
        selectNeighborhood(csvName);
      });
  });
}

// ── Highlight selected neighborhood across all maps ───────────────────────────
function highlightAllMaps(csvName) {
  const geoName = NAME_MAP[csvName] || csvName;

  d3.selectAll(".nhood")
    .attr("stroke", function(d) {
      return d.properties.name === geoName ? "#e63946" : "#fff";
    })
    .attr("stroke-width", function(d) {
      return d.properties.name === geoName ? 2 : 0.5;
    })
    .attr("opacity", function(d) {
      return csvName ? (d.properties.name === geoName ? 1 : 0.4) : 1;
    });
}

// ── Select neighborhood → show detail panel ───────────────────────────────────
function selectNeighborhood(csvName) {
  selectedNeighborhood = csvName;
  highlightAllMaps(csvName);
  showDetailPanel(csvName);
}

function closeDetail() {
  selectedNeighborhood = null;
  d3.selectAll(".nhood").attr("stroke", "#fff").attr("stroke-width", 0.5).attr("opacity", 1);
  document.getElementById("detail-panel").classList.remove("visible");
}

function cycleNeighborhood(dir) {
  if (!selectedNeighborhood) return;
  const idx = allNeighborhoods.indexOf(selectedNeighborhood);
  const next = (idx + dir + allNeighborhoods.length) % allNeighborhoods.length;
  selectNeighborhood(allNeighborhoods[next]);
}

// ── Show detail panel ─────────────────────────────────────────────────────────
function showDetailPanel(csvName) {
  const panel = document.getElementById("detail-panel");
  panel.classList.add("visible");

  // Header
  document.getElementById("detail-nhood-name").textContent = csvName;

  const summary = nhoodSummary.find(d => d.neighborhood === csvName) || {};
  const statsEl = document.getElementById("detail-stats");
  statsEl.innerHTML = `
    <span class="stat-chip">${(summary.total || 0).toLocaleString()} total evictions</span>
    <span class="stat-chip">Peak: ${summary.peak_year || "—"}</span>
    <span class="stat-chip">Top reason: ${summary.top_reason || "—"}</span>
  `;

  // Line chart
  const lineData = nhoodYear
    .filter(d => d.neighborhood === csvName)
    .sort((a, b) => a.year - b.year);
  drawDetailLine(lineData);

  // Bar chart
  const barData = nhoodReason
    .filter(d => d.neighborhood === csvName)
    .sort((a, b) => b.count - a.count);
  drawDetailBar(barData);

  panel.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ── Detail: Line chart ────────────────────────────────────────────────────────
function drawDetailLine(data) {
  const W = 360, H = 180;
  const m = { top: 10, right: 20, bottom: 30, left: 50 };

  const svg = d3.select("#detail-line-svg")
    .attr("width", W)
    .attr("height", H);

  svg.selectAll("*").remove();
  const g = svg.append("g").attr("transform", `translate(${m.left},${m.top})`);
  const iW = W - m.left - m.right;
  const iH = H - m.top - m.bottom;

  if (data.length === 0) return;

  const x = d3.scaleLinear().domain(d3.extent(data, d => d.year)).range([0, iW]);
  const y = d3.scaleLinear().domain([0, d3.max(data, d => d.count) * 1.15]).range([iH, 0]);

  g.append("g").attr("transform", `translate(0,${iH})`)
    .call(d3.axisBottom(x).tickFormat(d3.format("d")).ticks(7));
  g.append("g")
    .call(d3.axisLeft(y).ticks(5).tickFormat(d => d.toLocaleString()));

  const line = d3.line().x(d => x(d.year)).y(d => y(d.count)).curve(d3.curveMonotoneX);
  const area = d3.area().x(d => x(d.year)).y0(iH).y1(d => y(d.count)).curve(d3.curveMonotoneX);

  g.append("path").datum(data)
    .attr("fill", "#ede8f8").attr("d", area);
  g.append("path").datum(data)
    .attr("fill", "none").attr("stroke", "#3d2b7a").attr("stroke-width", 2).attr("d", line);

  g.selectAll(".dot")
    .data(data)
    .join("circle")
      .attr("cx", d => x(d.year)).attr("cy", d => y(d.count))
      .attr("r", 3).attr("fill", "#3d2b7a")
    .on("mousemove", (event, d) => {
      tooltip.style("opacity", 1)
        .style("left", (event.clientX + 14) + "px")
        .style("top", (event.clientY - 32) + "px")
        .html(`<strong>${d.year}</strong>: ${d.count.toLocaleString()}`);
    })
    .on("mouseleave", () => tooltip.style("opacity", 0));
}

// ── Detail: Bar chart (reasons) ───────────────────────────────────────────────
function drawDetailBar(data) {
  const W = 300, H = 180;
  const m = { top: 10, right: 20, bottom: 10, left: 140 };

  const svg = d3.select("#detail-bar-svg")
    .attr("width", W)
    .attr("height", H);

  svg.selectAll("*").remove();
  if (data.length === 0) return;

  const g = svg.append("g").attr("transform", `translate(${m.left},${m.top})`);
  const iW = W - m.left - m.right;
  const iH = H - m.top - m.bottom;

  const x = d3.scaleLinear().domain([0, d3.max(data, d => d.count)]).range([0, iW]);
  const y = d3.scaleBand().domain(data.map(d => d.reason)).range([0, iH]).padding(0.2);

  g.append("g").call(d3.axisLeft(y).tickSize(0))
    .selectAll("text").style("font-size", "10px");

  g.selectAll(".bar")
    .data(data)
    .join("rect")
      .attr("y", d => y(d.reason)).attr("height", y.bandwidth())
      .attr("x", 0).attr("width", d => x(d.count))
      .attr("fill", d => COLOR_REASONS(d.reason))
    .on("mousemove", (event, d) => {
      tooltip.style("opacity", 1)
        .style("left", (event.clientX + 14) + "px")
        .style("top", (event.clientY - 32) + "px")
        .html(`<strong>${d.reason}</strong>: ${d.count.toLocaleString()}`);
    })
    .on("mouseleave", () => tooltip.style("opacity", 0));
}

// ── Legend gradient (canvas) ──────────────────────────────────────────────────
function buildLegend(maxCount) {
  const canvas = document.getElementById("legend-gradient-box");
  const ctx = canvas.getContext("2d");
  const W = canvas.width;
  for (let i = 0; i < W; i++) {
    ctx.fillStyle = globalColorScale(i / W * maxCount * 0.75);
    ctx.fillRect(i, 0, 1, canvas.height);
  }
}

// ── Build reason legend ───────────────────────────────────────────────────────
function buildReasonLegend() {
  const leg = d3.select("#reason-legend");
  REASONS.forEach(r => {
    const item = leg.append("div").attr("class", "reason-legend-item");
    item.append("div").attr("class", "reason-dot").style("background", COLOR_REASONS(r));
    item.append("span").text(r);
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cost of Living by State</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      color: #333;
      margin: 0;
      padding: 20px;
    }
    a.back {
      display: inline-block;
      margin-bottom: 16px;
      color: white;
      background: steelblue;
      padding: 6px 14px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 14px;
    }
    h1 { color: #2c3e50; margin: 0 0 16px; }
    #tooltip {
      position: absolute;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      pointer-events: none;
      display: none;
    }
    .state-path { stroke: #fff; stroke-width: 0.5px; fill: #dce8f0; }
    .symbol { stroke: white; stroke-width: 0.8px; opacity: 0.85; cursor: pointer; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back to Home</a>
  <h1>Cost of Living Index by State</h1>
  <div id="tooltip"></div>
  <svg id="map"></svg>
  <div style="display:flex; gap:40px; margin-top:16px; align-items:center; font-size:14px;">
    <div><strong>Cost Index</strong><br>Circle size = cost index value</div>
    <div><span style="display:inline-block;width:14px;height:14px;background:#e05a30;border-radius:50%;vertical-align:middle;margin-right:6px;"></span>Top 10 most expensive</div>
    <div><span style="display:inline-block;width:14px;height:14px;background:steelblue;border-radius:50%;vertical-align:middle;margin-right:6px;"></span>Other states</div>
  </div>

  <script>
    const width = 960, height = 600;

    const svg = d3.select("#map")
      .attr("width", width)
      .attr("height", height);

    const projection = d3.geoAlbersUsa()
      .scale(1300)
      .translate([487.5, 305]);

    // State paths use null projection — states-albers-10m.json is already pre-projected
    const path = d3.geoPath();
    const tooltip = d3.select("#tooltip");

    Promise.all([
      d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-albers-10m.json"),
      d3.csv("data/expensive-states.csv"),
      d3.csv("data/state.csv")
    ]).then(function([us, costData, stateCoords]) {

      // Build cost lookup by state name
      const costMap = new Map();
      costData.forEach(function(d) {
        costMap.set(d.State.trim(), {
          costRank: +d.costRank,
          costIndex: +d.costIndex,
          housingCost: +d.housingCost,
          groceryCost: +d.groceryCost
        });
      });

      // Build centroid lookup by state name
      const coordMap = new Map();
      stateCoords.forEach(function(d) {
        coordMap.set(d.state.trim(), { lat: +d.lat, lng: +d.lng });
      });

      // Draw state outlines
      const states = topojson.feature(us, us.objects.states);
      svg.selectAll(".state-path")
        .data(states.features)
        .join("path")
        .attr("class", "state-path")
        .attr("d", path);

      // Size scale
      const maxCost = d3.max(costData, d => +d.costIndex);
      const minCost = d3.min(costData, d => +d.costIndex);
      const radiusScale = d3.scaleSqrt()
        .domain([minCost, maxCost])
        .range([6, 36]);

      // Sort by costIndex descending so smaller circles draw on top
      const sorted = [...costMap.entries()].sort((a, b) => b[1].costIndex - a[1].costIndex);

      // Top 10 = 10 entries with the lowest costRank values
      const top10Names = new Set(
        [...costMap.entries()]
          .sort((a, b) => a[1].costRank - b[1].costRank)
          .slice(0, 10)
          .map(([name]) => name)
      );

      sorted.forEach(function([stateName, info]) {
        const coords = coordMap.get(stateName);
        if (!coords) return;

        const projCoords = projection([coords.lng, coords.lat]);
        if (!projCoords) return;

        const isTop10 = top10Names.has(stateName);
        const r = radiusScale(info.costIndex);

        svg.append("circle")
          .attr("class", "symbol")
          .attr("cx", projCoords[0])
          .attr("cy", projCoords[1])
          .attr("r", r)
          .attr("fill", isTop10 ? "#e05a30" : "steelblue")
          .on("mouseover", function(event) {
            tooltip.style("display", "block")
              .html("<strong>" + stateName + "</strong>" +
                    "<br>Cost Index: " + info.costIndex.toFixed(1) +
                    "<br>Housing Cost: " + info.housingCost.toFixed(1) +
                    "<br>Grocery Cost: " + info.groceryCost.toFixed(1));
          })
          .on("mousemove", function(event) {
            tooltip.style("left", (event.pageX + 12) + "px")
              .style("top", (event.pageY - 28) + "px");
          })
          .on("mouseout", function() {
            tooltip.style("display", "none");
          });
      });

    });
  </script>
</body>
</html>

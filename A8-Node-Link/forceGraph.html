<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Force-Directed Graph – TV Shows</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background: #fafafa; color: #333; margin: 0; padding: 20px; }
    h1 { color: #2c3e50; }
    .chart-link { display: inline-block; background: steelblue; color: white; padding: 8px 16px; border-radius: 5px; margin-bottom: 16px; font-size: 14px; text-decoration: none; }
    .chart-link:hover { background: #2a6496; }
    .chart-container { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 10px; }
    .tooltip { position: absolute; background: white; border: 1px solid #ccc; border-radius: 4px; padding: 8px; font-family: Arial, sans-serif; font-size: 13px; pointer-events: none; opacity: 0; }
    line { stroke: #aaa; stroke-opacity: 0.6; }
    circle { cursor: pointer; }
  </style>
</head>
<body>
  <a class="chart-link" href="index.html">← Back to Index</a>
  <h1>Force-Directed Graph – TV Shows</h1>
  <div class="chart-container">
    <svg id="chart" width="800" height="600"></svg>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const width = 800, height = 600;
    const svg = d3.select("#chart");
    const tooltip = d3.select("#tooltip");

    d3.csv("data_2/edges.csv").then(data => {
      const nodeSet = new Set();
      data.forEach(d => { nodeSet.add(d.source); nodeSet.add(d.target); });
      const nodes = Array.from(nodeSet).map(id => ({ id }));
      const links = data.map(d => ({ source: d.source, target: d.target }));

      const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(40))
        .force("charge", d3.forceManyBody().strength(-80))
        .force("center", d3.forceCenter(width / 2, height / 2));

      const link = svg.append("g").selectAll("line")
        .data(links).join("line");

      const node = svg.append("g").selectAll("circle")
        .data(nodes).join("circle")
        .attr("r", 6)
        .attr("fill", "steelblue")
        .on("mouseover", (event, d) => {
          d3.select(event.currentTarget).attr("fill", "orange").attr("r", 9);
          tooltip.style("opacity", 1).html("Node: " + d.id);
        })
        .on("mousemove", event => {
          tooltip.style("left", (event.pageX + 12) + "px").style("top", (event.pageY - 20) + "px");
        })
        .on("mouseout", event => {
          d3.select(event.currentTarget).attr("fill", "steelblue").attr("r", 6);
          tooltip.style("opacity", 0);
        })
        .call(d3.drag()
          .on("start", (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on("end", (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
        );

      simulation.on("tick", () => {
        link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        node.attr("cx", d => d.x).attr("cy", d => d.y);
      });
    });
  </script>
</body>
</html>

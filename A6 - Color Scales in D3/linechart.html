<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi-Line Chart – Monthly Average Hours</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    .back-link {
      align-self: flex-start;
      max-width: 940px;
      width: 100%;
      margin: 0 auto 15px auto;
    }
    .chart-link {
      display: inline-block;
      background: steelblue;
      color: white;
      padding: 8px 18px;
      border-radius: 5px;
      font-size: 14px;
      text-decoration: none;
    }
    .chart-link:hover { background: #2a6496; }
    .chart-container {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 30px;
      max-width: 940px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    h1 { color: #2c3e50; font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #777; margin-bottom: 20px; }
    .axis text { fill: #555; font-family: Arial, sans-serif; font-size: 12px; }
    .axis path, .axis line { stroke: #ccc; }
    .axis-label { fill: #555; font-size: 13px; font-family: Arial, sans-serif; }
    .line-path { fill: none; stroke-width: 2.2px; }
    .dot { cursor: pointer; }
    .tooltip {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      color: #333;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      font-family: Arial, sans-serif;
    }
    .legendTitle { font-size: 12px; font-weight: bold; fill: #333; font-family: Arial, sans-serif; }
    .label { font-size: 11px; fill: #555; font-family: Arial, sans-serif; }
  </style>
</head>
<body>
  <div class="back-link"><a class="chart-link" href="index.html">← Back to Home</a></div>
  <div class="chart-container">
    <h1>Monthly Average Hours by Category</h1>
    <p class="subtitle">Qualitative ColorBrewer scale (<code>d3.schemeSet1</code>)</p>
    <div id="chart"></div>
  </div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const margin = { top: 60, right: 180, bottom: 60, left: 70 };
    const innerWidth  = 580;
    const innerHeight = 380;
    const svgW = innerWidth + margin.left + margin.right;
    const svgH = innerHeight + margin.top + margin.bottom;

    const svg = d3.select("#chart")
      .append("svg")
      .attr("viewBox", `0 0 ${svgW} ${svgH}`)
      .attr("preserveAspectRatio", "xMidYMid meet")
      .style("width", "100%")
      .style("height", "auto")
      .append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    const tooltip  = d3.select("#tooltip");
    const parseDate = d3.timeParse("%Y-%m-%d");
    const fmtMonth  = d3.timeFormat("%b %Y");

    const series = [
      { key: "social_media",  label: "Social Media",      col: "social_media_hours" },
      { key: "work_study",    label: "Work / Study",       col: "work_or_study_hours" },
      { key: "entertainment", label: "Entertainment",      col: "entertainment_hours" },
      { key: "total",         label: "Total Screen Time",  col: "total_screen_time" }
    ];

    const colorScale = d3.scaleOrdinal()
      .domain(series.map(s => s.label))
      .range(d3.schemeSet1);

    d3.csv("data/daily_usage.csv").then(data => {
      data.forEach(d => {
        d.social_media_hours  = +d.social_media_hours;
        d.work_or_study_hours = +d.work_or_study_hours;
        d.entertainment_hours = +d.entertainment_hours;
        d.total_screen_time   = +d.total_screen_time;
        d.age                 = +d.age;
        d.parsedDate          = parseDate(d.date);
      });

      const byMonth = d3.rollup(
        data,
        v => ({
          social_media:  d3.mean(v, d => d.social_media_hours),
          work_study:    d3.mean(v, d => d.work_or_study_hours),
          entertainment: d3.mean(v, d => d.entertainment_hours),
          total:         d3.mean(v, d => d.total_screen_time),
          count: v.length
        }),
        d => d3.timeMonth(d.parsedDate)
      );

      const monthly = Array.from(byMonth, ([date, vals]) => ({ date, ...vals }))
        .sort((a, b) => a.date - b.date);

      const x = d3.scaleTime()
        .domain(d3.extent(monthly, d => d.date))
        .range([0, innerWidth]);

      const allVals = monthly.flatMap(d =>
        series.map(s => d[s.key])
      );
      const yMax = d3.max(allVals) * 1.12;

      const y = d3.scaleLinear()
        .domain([0, yMax])
        .nice()
        .range([innerHeight, 0]);

      svg.append("g")
        .call(d3.axisLeft(y).ticks(6).tickSize(-innerWidth).tickFormat(""))
        .call(g => g.select(".domain").remove())
        .call(g => g.selectAll("line").attr("stroke", "#e8e8e8"));

      svg.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(
          d3.axisBottom(x)
            .ticks(d3.timeMonth.every(1))
            .tickFormat(d3.timeFormat("%b '%y"))
        )
        .selectAll("text")
          .attr("dy", "1.1em");

      svg.append("g")
        .attr("class", "axis")
        .call(d3.axisLeft(y).ticks(6).tickFormat(d => d + "h"))
        .call(g => g.select(".domain").remove());

      svg.append("text")
        .attr("class", "axis-label")
        .attr("x", innerWidth / 2)
        .attr("y", innerHeight + 50)
        .attr("text-anchor", "middle")
        .text("Month");

      svg.append("text")
        .attr("class", "axis-label")
        .attr("transform", "rotate(-90)")
        .attr("x", -innerHeight / 2)
        .attr("y", -54)
        .attr("text-anchor", "middle")
        .text("Average Hours per Day");

      svg.append("text")
        .attr("x", innerWidth / 2)
        .attr("y", -28)
        .attr("text-anchor", "middle")
        .attr("font-size", "15px")
        .attr("font-weight", "bold")
        .attr("fill", "#2c3e50")
        .attr("font-family", "Arial, sans-serif")
        .text("Monthly Average Hours by Category");

      series.forEach(s => {
        const color = colorScale(s.label);

        const lineGen = d3.line()
          .x(d => x(d.date))
          .y(d => y(d[s.key]));

        svg.append("path")
          .datum(monthly)
          .attr("class", "line-path")
          .attr("d", lineGen)
          .attr("stroke", color)
          .attr("opacity", 0.85);

        svg.selectAll(`.dot-${s.key}`)
          .data(monthly)
          .join("circle")
          .attr("class", `dot dot-${s.key}`)
          .attr("cx", d => x(d.date))
          .attr("cy", d => y(d[s.key]))
          .attr("r", 4.5)
          .attr("fill", color)
          .attr("stroke", "#fff")
          .attr("stroke-width", 1.5)
          .on("mouseover", (event, d) => {
            tooltip.style("opacity", 1).html(
              `<strong>${fmtMonth(d.date)}</strong><br>` +
              `${s.label}: <strong>${d[s.key].toFixed(2)} hrs</strong><br>` +
              `n = ${d.count} records`
            );
            d3.select(event.target).attr("r", 7);
          })
          .on("mousemove", event => {
            tooltip
              .style("left", (event.pageX + 14) + "px")
              .style("top", (event.pageY - 50) + "px");
          })
          .on("mouseout", event => {
            tooltip.style("opacity", 0);
            d3.select(event.target).attr("r", 4.5);
          });
      });

      //susie qualitative color legend
      const legend = d3.legendColor()
        .title("Category")
        .scale(colorScale)
        .shapeWidth(22)
        .shapeHeight(14)
        .shapePadding(6)
        .labelAlign("start");

      svg.append("g")
        .attr("class", "legendColor")
        .attr("transform", `translate(${innerWidth + 22}, 10)`)
        .call(legend);

    }).catch(err => {
      d3.select("#chart").append("p")
        .style("color", "red")
        .text("Error loading data: " + err.message);
    });
  </script>
</body>
</html>

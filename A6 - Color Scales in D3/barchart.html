<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sequential Color Scale Bar Chart</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    .back-link {
      align-self: flex-start;
      max-width: 940px;
      width: 100%;
      margin: 0 auto 15px auto;
    }
    .chart-link {
      display: inline-block;
      background: steelblue;
      color: white;
      padding: 8px 18px;
      border-radius: 5px;
      font-size: 14px;
      text-decoration: none;
    }
    .chart-link:hover { background: #2a6496; }
    .chart-container {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 30px;
      max-width: 940px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    h1 { color: #2c3e50; font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #777; margin-bottom: 20px; }
    .axis text { fill: #555; font-family: Arial, sans-serif; font-size: 12px; }
    .axis path, .axis line { stroke: #ccc; }
    .axis-label { fill: #555; font-size: 13px; font-family: Arial, sans-serif; }
    .tooltip {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      color: #333;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      font-family: Arial, sans-serif;
    }
    .legendTitle { font-size: 12px; font-weight: bold; fill: #333; font-family: Arial, sans-serif; }
    .label { font-size: 11px; fill: #555; font-family: Arial, sans-serif; }
  </style>
</head>
<body>
  <div class="back-link"><a class="chart-link" href="index.html">← Back to Home</a></div>
  <div class="chart-container">
    <h1>Average Total Screen Time by Age Group</h1>
    <p class="subtitle">Sequential ColorBrewer scale (<code>d3.schemeBlues[5]</code>)</p>
    <div id="chart"></div>
  </div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const margin = { top: 60, right: 180, bottom: 60, left: 70 };
    const innerWidth  = 580;
    const innerHeight = 360;
    const svgW = innerWidth + margin.left + margin.right;
    const svgH = innerHeight + margin.top + margin.bottom;

    const svg = d3.select("#chart")
      .append("svg")
      .attr("viewBox", `0 0 ${svgW} ${svgH}`)
      .attr("preserveAspectRatio", "xMidYMid meet")
      .style("width", "100%")
      .style("height", "auto")
      .append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    const tooltip = d3.select("#tooltip");
    const ageOrder = ["13-18", "19-25", "26-35", "36-50", "51+"];

    d3.csv("data/daily_usage.csv").then(data => {
      data.forEach(d => {
        d.social_media_hours  = +d.social_media_hours;
        d.work_or_study_hours = +d.work_or_study_hours;
        d.entertainment_hours = +d.entertainment_hours;
        d.total_screen_time   = +d.total_screen_time;
        d.age                 = +d.age;
      });

      const aggMap = d3.rollup(
        data,
        v => d3.mean(v, d => d.total_screen_time),
        d => d.age_group
      );
      const aggData = ageOrder.map(ag => ({ age_group: ag, avg: aggMap.get(ag) }));

      const x = d3.scaleBand()
        .domain(ageOrder)
        .range([0, innerWidth])
        .padding(0.3);

      const yMax = d3.max(aggData, d => d.avg) * 1.15;
      const y = d3.scaleLinear()
        .domain([0, yMax])
        .nice()
        .range([innerHeight, 0]);

      const [minAvg, maxAvg] = d3.extent(aggData, d => d.avg);
      const colorScale = d3.scaleQuantize()
        .domain([minAvg, maxAvg])
        .range(d3.schemeBlues[5]);

      svg.append("g")
        .call(d3.axisLeft(y).ticks(6).tickSize(-innerWidth).tickFormat(""))
        .call(g => g.select(".domain").remove())
        .call(g => g.selectAll("line").attr("stroke", "#e8e8e8"));

      svg.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(d3.axisBottom(x));

      svg.append("g")
        .attr("class", "axis")
        .call(d3.axisLeft(y).ticks(6).tickFormat(d => d.toFixed(1) + "h"))
        .call(g => g.select(".domain").remove());

      svg.append("text")
        .attr("class", "axis-label")
        .attr("x", innerWidth / 2)
        .attr("y", innerHeight + 46)
        .attr("text-anchor", "middle")
        .text("Age Group");

      svg.append("text")
        .attr("class", "axis-label")
        .attr("transform", "rotate(-90)")
        .attr("x", -innerHeight / 2)
        .attr("y", -54)
        .attr("text-anchor", "middle")
        .text("Average Total Screen Time (hrs)");

      svg.append("text")
        .attr("x", innerWidth / 2)
        .attr("y", -28)
        .attr("text-anchor", "middle")
        .attr("font-size", "15px")
        .attr("font-weight", "bold")
        .attr("fill", "#2c3e50")
        .attr("font-family", "Arial, sans-serif")
        .text("Average Total Screen Time by Age Group");

      svg.selectAll(".bar")
        .data(aggData)
        .join("rect")
        .attr("class", "bar")
        .attr("x", d => x(d.age_group))
        .attr("y", d => y(d.avg))
        .attr("width", x.bandwidth())
        .attr("height", d => innerHeight - y(d.avg))
        .attr("fill", d => colorScale(d.avg))
        .attr("rx", 3)
        .style("cursor", "pointer")
        .on("mouseover", (event, d) => {
          tooltip.style("opacity", 1).html(
            `<strong>Age Group: ${d.age_group}</strong><br>` +
            `Avg Screen Time: <strong>${d.avg.toFixed(2)} hrs</strong>`
          );
          d3.select(event.target).attr("opacity", 0.8);
        })
        .on("mousemove", event => {
          tooltip
            .style("left", (event.pageX + 14) + "px")
            .style("top", (event.pageY - 42) + "px");
        })
        .on("mouseout", event => {
          tooltip.style("opacity", 0);
          d3.select(event.target).attr("opacity", 1);
        });

      svg.selectAll(".bar-label")
        .data(aggData)
        .join("text")
        .attr("class", "bar-label")
        .attr("x", d => x(d.age_group) + x.bandwidth() / 2)
        .attr("y", d => y(d.avg) - 6)
        .attr("text-anchor", "middle")
        .attr("font-size", "11px")
        .attr("fill", "#555")
        .attr("font-family", "Arial, sans-serif")
        .text(d => d.avg.toFixed(2));

      //susie Lu color legend 
      const legend = d3.legendColor()
        .title("Avg Screen Time (hrs)")
        .scale(colorScale)
        .shapeWidth(22)
        .shapeHeight(14)
        .shapePadding(4)
        .labelFormat(d3.format(".2f"))
        .labelAlign("start");

      svg.append("g")
        .attr("class", "legendColor")
        .attr("transform", `translate(${innerWidth + 22}, 10)`)
        .call(legend);

    }).catch(err => {
      d3.select("#chart").append("p")
        .style("color", "red")
        .text("Error loading data: " + err.message);
    });
  </script>
</body>
</html>
